<!DOCTYPE html>

<title>Tank the Turtle - Sea Breeze Propane</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,wght@0,500;1,400&display=swap" rel="stylesheet"/>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--t:#0F6E56;--tl:#E1F5EE;--tm:#1D9E75;--td:#085041;--sl:#E6F1FB;--sal:#FAEEDA;--bg:#f7faf9;--su:#f0f5f3;--c:#fff;--tx:#1a2e28;--mu:#5a7a6e;--b:rgba(15,110,86,0.15);--r:18px;--f:"DM Sans",sans-serif}body{font-family:var(--f);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center}.topbar{width:100%;background:var(--t);padding:10px 24px;display:flex;align-items:center;justify-content:space-between}.topbar-brand{display:flex;align-items:center;gap:10px;color:#fff;font-size:15px;font-weight:600}.topbar-logo{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center}.topbar-logo svg{width:18px;height:18px;fill:#fff}.tb{background:rgba(255,255,255,0.2);color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500}.tba{background:rgba(255,255,255,0.35);color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}.ww{width:100%;max-width:460px;padding:16px 16px 40px}.sw{border-radius:var(--r);border:.5px solid var(--b);background:var(--c);overflow:hidden;display:flex;flex-direction:column;height:640px;box-shadow:0 4px 32px rgba(15,110,86,.10)}.sh{background:var(--t);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}.sa{width:42px;height:42px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}.sa svg{width:22px;height:22px;fill:#fff}.shi{flex:1}.shn{color:#fff;font-size:15px;font-weight:600;line-height:1.3}.shs{color:rgba(255,255,255,.75);font-size:12px;display:flex;align-items:center;gap:5px;margin-top:1px}.sd{width:7px;height:7px;background:#9FE1CB;border-radius:50%;display:inline-block;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.sr{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;padding:4px 8px;border-radius:6px;font-family:var(--f)}.sm{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}.msg{display:flex;gap:8px;align-items:flex-end;animation:sf .22s ease}@keyframes sf{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.mb{align-self:flex-start;max-width:90%}.mu2{align-self:flex-end;flex-direction:row-reverse;max-width:90%}.bb{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;color:var(--tx)}.mb .bb{background:var(--su);border-bottom-left-radius:4px;border:.5px solid var(--b)}.mu2 .bb{background:var(--t);color:#fff;border-bottom-right-radius:4px}.sc{display:flex;flex-wrap:wrap;gap:7px;padding:4px 16px 10px;flex-shrink:0}.chip{background:var(--tl);color:var(--td);border:.5px solid #9FE1CB;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--f);white-space:nowrap}.csky{background:var(--sl);color:#0C447C;border-color:#B5D4F4}.csand{background:var(--sal);color:#633806;border-color:#FAC775}.sir{display:flex;gap:8px;padding:10px 14px 14px;flex-shrink:0;border-top:.5px solid var(--b);background:var(--c)}.si{flex:1;border:.5px solid var(--b);border-radius:22px;padding:9px 16px;font-size:14px;font-family:var(--f);background:var(--su);color:var(--tx);outline:none}.si:disabled{opacity:.5}.ss{width:38px;height:38px;background:var(--t);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.ss:disabled{opacity:.5}.ss svg{width:16px;height:16px;fill:#fff}.tw{background:var(--su);border-radius:16px;border-bottom-left-radius:4px;border:.5px solid var(--b);width:fit-content;padding:10px 14px}.tp{display:flex;gap:4px;align-items:center}.tp span{width:7px;height:7px;background:#9FE1CB;border-radius:50%;display:inline-block;animation:sb 1.2s infinite}.tp span:nth-child(2){animation-delay:.2s}.tp span:nth-child(3){animation-delay:.4s}@keyframes sb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}.err{background:#FCEBEB;border:.5px solid #F7C1C1;border-radius:12px;padding:10px 14px;font-size:13px;color:#A32D2D;margin:0 16px 10px}.footer{width:100%;text-align:center;padding:16px 24px 32px;font-size:12px;color:var(--mu)}.footer a{color:var(--tm);text-decoration:none}</style></head><body>
<div class="topbar"><div class="topbar-brand"><div class="topbar-logo"><svg viewBox="0 0 24 24"><path d="M17.66 7.93L12 2.27 6.34 7.93c-3.12 3.12-3.12 8.19 0 11.31C7.9 20.8 9.95 21.58 12 21.58c2.05 0 4.1-.78 5.66-2.34 3.12-3.12 3.12-8.19 0-11.31z"/></svg></div>Sea Breeze Propane</div><div style="display:flex;gap:8px"><span class="tba">AI Powered</span><span class="tb">Beta v2</span></div></div>
<div class="ww"><div class="sw">
<div class="sh"><div class="sa"><svg viewBox="0 0 24 24"><path d="M17.66 7.93L12 2.27 6.34 7.93c-3.12 3.12-3.12 8.19 0 11.31C7.9 20.8 9.95 21.58 12 21.58c2.05 0 4.1-.78 5.66-2.34 3.12-3.12 3.12-8.19 0-11.31z"/></svg></div><div class="shi"><div class="shn">Tank the Turtle - Sea Breeze Propane</div><div class="shs"><span class="sd"></span>AI Assistant - NE Florida &amp; Gainesville</div></div><button class="sr" onclick="resetChat()">Reset</button></div>
<div class="sm" id="messages"></div>
<div class="sc" id="chips"></div>
<div class="sir"><input class="si" id="inp" placeholder="Ask me anything about propane..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)go()"/><button class="ss" id="btn" onclick="go()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button></div>
</div></div>
<div class="footer">Powered by Claude AI &nbsp;&middot;&nbsp; <a href="https://seabreezelp.com" target="_blank">seabreezelp.com</a></div>
<script>
var ch=[],busy=false,_leadLogged=false;
var M=document.getElementById("messages"),C=document.getElementById("chips"),I=document.getElementById("inp"),B=document.getElementById("btn");
function lock(on){busy=on;I.disabled=on;B.disabled=on;I.placeholder=on?"Tank is thinking...":"Ask me anything about propane...";}
function msg(html,r){var d=document.createElement("div");d.className="msg "+(r==="bot"?"mb":"mu2");var b=document.createElement("div");b.className="bb";if(r==="bot"){b.innerHTML=html;}else{b.textContent=html;}d.appendChild(b);M.appendChild(d);M.scrollTop=M.scrollHeight;}
function spin(){var d=document.createElement("div");d.className="msg mb";d.id="sp";var t=document.createElement("div");t.className="tw";t.innerHTML='<div class="tp"><span></span><span></span><span></span></div>';d.appendChild(t);M.appendChild(d);M.scrollTop=M.scrollHeight;}
function unspin(){var t=document.getElementById("sp");if(t)t.remove();}
function chips(list){C.innerHTML="";if(!list||!list.length)return;list.forEach(function(c){var b=document.createElement("button");b.className="chip "+(c.s||"");b.textContent=c.l;b.onclick=function(){C.innerHTML="";run(c.l);};C.appendChild(b);});}
function fmt(t){var s=t.split("**");var o="";for(var i=0;i<s.length;i++){o+=i%2===0?s[i]:"<strong>"+s[i]+"</strong>";}return o.split("\n").join("<br>");}
async function api(m){ch.push({role:"user",content:m});var r=await fetch("/.netlify/functions/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:ch,leadLogged:_leadLogged})});if(!r.ok)throw new Error(r.status);var d=await r.json();ch.push({role:"assistant",content:d.text});if(d.captured){_leadLogged=true;}return d.text;}
async function run(text){if(!text||!text.trim()||busy)return;msg(text,"user");C.innerHTML="";lock(true);spin();
try{var res=await api(text);unspin();msg(fmt(res),"bot");
var lo=res.toLowerCase();
if(lo.indexOf("within the hour")>-1||lo.indexOf("next business day")>-1){chips([{l:"Ask another question"},{l:"Thank you",s:"csky"}]);}
else if(lo.indexOf("forklift")>-1||lo.indexOf("cylinder exchange")>-1){chips([{l:"Commercial inquiry",s:"csky"},{l:"More info"}]);}
else if(ch.length<=2){chips([{l:"Check my service area"},{l:"What size tank do I need?"},{l:"I need a delivery",s:"csand"},{l:"Commercial inquiry",s:"csky"}]);}
}catch(e){unspin();var ed=document.createElement("div");ed.className="err";ed.textContent="Something went wrong. Please try again.";M.appendChild(ed);M.scrollTop=M.scrollHeight;ch.pop();}
lock(false);I.focus();}
function go(){var v=I.value.trim();if(!v||busy)return;I.value="";run(v);}
async function resetChat(){ch=[];M.innerHTML="";C.innerHTML="";_leadLogged=false;lock(false);await start();}
async function start(){lock(true);spin();
try{var o=await api("Hello! Give me a warm 1-2 sentence opening as Tank the Turtle for Sea Breeze Propane. Be welcoming and invite them to share what they need. Do not list features.");unspin();msg(fmt(o),"bot");}
catch(e){unspin();msg("Sea Breeze Propane, this is Tank - how can I help you today?","bot");}
chips([{l:"Check my service area"},{l:"What size tank do I need?"},{l:"I need a delivery",s:"csand"},{l:"Commercial inquiry",s:"csky"}]);lock(false);}
start();
</script></body></html>
